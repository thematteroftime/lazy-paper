- fig_id: Fig. 3
  visual_summary: Figure 3 displays HAADF-STEM images and corresponding dipole analysis for three samples (PH, Cd0, Cd3).
    Each panel (a–c) includes a high-resolution atomic-scale image with color-coded cation displacements, vector maps showing
    displacement directions, phase maps visualizing polarization angles via color gradients, and scatter plots of polarization
    angle vs. magnitude. The scale bar is 2 nm. Polarization angles range from -180° to 180°, with magnitude up to ~0.5 Å.
    Panel (a) shows highly ordered, periodic zigzag patterns with two distinct clusters in the scatter plot. Panel (b) exhibits
    localized disorder and broader angular spread. Panel (c) reveals mixed N=4 and N=5 modulation periods, with a wide distribution
    of angles and magnitudes, indicating heterogeneous dipolar structures.
  text_claim_check:
  - claim: The displacement vectors display remarkable regularity in both their angular and magnitude distributions, indicating
      a highly ordered dipole configuration within the material.
    verdict: supported
    note: The HAADF-STEM image and scatter plot in panel (a) show clear periodicity and two well-separated clusters, consistent
      with ordered AFE domains.
  - claim: The dipole arrangement in Cd0 deviates from the standard 180° antiparallel displacement, displaying localized displacement
      deflections.
    verdict: supported
    note: Panel (b) shows irregularities in the vector map and broader scatter in the angle-magnitude plot, confirming local
      disorder.
  - claim: 'In the Cd3 sample... the displacement sequence of Pb²⁺ ions can be roughly divided into two categories: 3-2 and
      2-2 sequences.'
    verdict: supported
    note: Panel (c) clearly shows alternating regions with different modulation periods, visually supporting the coexistence
      of N=4 and N=5 stripes.
  deep_observation: While the figure effectively demonstrates increasing structural heterogeneity from PH to Cd3, the spatial
    resolution of the vector maps may not fully resolve individual atomic columns due to beam broadening in STEM. Moreover,
    the color-coded phase maps assume uniform contrast sensitivity across the field of view, which could mask subtle variations
    in local strain or chemical composition. The absence of quantitative statistical analysis (e.g., correlation lengths or
    entropy metrics) limits direct comparison of disorder levels. Additionally, the inset diagrams in (a) and (b) use simplified
    models that do not reflect the actual complexity seen in (c), potentially overemphasizing order in early stages. This
    suggests that while the data support the HDS concept, the interpretation relies heavily on qualitative visual cues rather
    than rigorous quantification.
  caption: Atomic-scale dipole ordering in antiferroelectric ceramics
