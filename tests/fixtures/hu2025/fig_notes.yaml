- fig_id: Fig. 1
  visual_summary: 'Figure 1 presents three panels (a, b, c) comparing the free energy landscapes, P-E hysteresis loops, and
    dipole configurations for PH (traditional AFE), Cd0 (mildly disordered), and Cd3 (nano-heterogeneous) ceramics. Each panel
    includes a free energy vs. polarization plot showing double-well or multi-well structures with labeled transition fields
    (E_A, E_F) and energy barriers (ΔE). Below are P-E loops: (a) shows a sharp double-loop typical of AFE, (b) displays a
    slanted loop with reduced hysteresis, and (c) exhibits a nearly linear loop with minimal remnant polarization. The bottom
    row visualizes dipole orientations via colored arrows; (a) has uniform domains, (b) shows partial disorder, and (c) reveals
    highly randomized nanoscale dipoles. Zoomed insets highlight local variations in polarization alignment.'
  text_claim_check:
  - claim: For the conventional long-range ordered AFE system of PH ceramic, the AFE–FE transition is induced under an applied
      electric field, resulting in a characteristic double P–E loop (Fig. 1a).
    verdict: supported
    note: Panel (a) clearly shows a double-loop P-E curve and a symmetric free energy landscape with two minima at P_AFE and
      P_FE, consistent with a classic AFE-to-FE transition.
  - claim: Such ceramics exhibit large AFE domains with relatively uniform polarization orientations, which switch slowly
      under the external electric field, contributing to substantial hysteresis losses.
    verdict: supported
    note: The dipole configuration in (a) shows large, uniformly aligned domains, and the wide hysteresis loop confirms high
      energy loss during switching.
  - claim: As the concentration of doped elements increases, defects induced by atomic size, mass, and electronegativity mismatches
      cause local compositional inhomogeneity, disrupting the long-range AFE ordering.
    verdict: supported
    note: Panels (b) and (c) show increasing disorder in dipole arrangements, correlating with higher doping levels and reduced
      domain coherence.
  - claim: This leads to a progressive reduction in domain size and an increasingly disordered polarization orientation (Fig.
      1b).
    verdict: supported
    note: Panel (b) displays smaller, irregular domains and more random dipole directions compared to (a), indicating increased
      disorder.
  - claim: Especially, in Cd3 ceramics featuring highly dynamic hybrid dynamic structures (HDSs), AFE nanodomains exhibit
      rapid reversion to their initial state upon electric field removal, substantially suppressing hysteresis loss (Fig.
      1c).
    verdict: supported
    note: Panel (c) shows a nearly linear P-E loop with negligible remnant polarization and small hysteresis, consistent with
      fast relaxation and low loss.
  - claim: The disordered modulation structures disrupt long-range AFE ordering, generating polarization discontinuities that
      trigger bound charge redistribution and local electric field rearrangement, which in turn delays the polarization saturation.
    verdict: exaggerated
    note: While the figure shows disrupted order and delayed saturation in (c), the mechanism involving bound charge redistribution
      and local field rearrangement is not directly visualized and relies on interpretation beyond the data shown.
  deep_observation: While the figure effectively illustrates the evolution from ordered AFE to nano-heterogeneous states,
    it lacks quantitative metrics such as domain size distribution or correlation length, making it difficult to assess the
    true extent of disorder. The color-coding of dipoles appears arbitrary and may overemphasize randomness without clear
    physical meaning. Additionally, the free energy plots assume idealized symmetry, ignoring possible strain or interface
    effects that could influence real material behavior. The absence of temperature dependence or time-resolved dynamics limits
    the mechanistic insight into HDS formation and stability.
  caption: Evolution of dipolar structures from ordered AFE to nano-heterogeneous states
