- fig_id: Fig. 4
  visual_summary: Panel a shows temperature-dependent relative permittivity (ε_r) curves for PH, Cd0, and Cd3 samples, with
    ε_r peaking near 200°C for Cd3; inset highlights AFE phase transitions. Panel b plots phase transition temperatures T₀,
    T₁, T₂ across compositions, showing T₂ increasing with Cd content. Panels c and d display variable-temperature XRD contour
    maps and TEM/SAED images at 50–350°C, revealing structural evolution from AFE to MCC to PE_c phases. Panel e illustrates
    free energy profiles of HDSs at 25°C, 40°C, and 60°C, showing broadened minima due to heterogeneous energy. Panel f presents
    P-E loops at different temperatures, indicating reduced hysteresis and improved dielectric behavior at higher temperatures.
  text_claim_check:
  - claim: Dielectric properties and thermotropic phase transition of ceramics.
    verdict: supported
    note: The figure comprehensively displays dielectric response and phase transitions across temperature.
  - claim: a Temperature-dependent ε_r curves of ceramics.
    verdict: supported
    note: Panel a clearly shows ε_r vs. temperature for multiple samples.
  - claim: b Phase transition points of each phase of ceramics under temperature change.
    verdict: supported
    note: Panel b plots key transition temperatures as functions of composition.
  - claim: c Variable temperature XRD images
    verdict: supported
    note: Panels c and d include XRD contour maps and TEM/SAED data across temperatures.
  - claim: d TEM images and SAED images of the Cd3 samples at different temperatures.
    verdict: supported
    note: Panel d provides TEM and SAED images at five temperatures.
  - claim: e Free energy profiles of HDSs as a function of temperature.
    verdict: supported
    note: Panel e shows calculated free energy landscapes at three temperatures.
  - claim: f Dielectric performance response of HDSs as a function of temperature.
    verdict: supported
    note: Panel f shows P-E loops at different temperatures, reflecting dielectric behavior.
  deep_observation: The TEM/SAED sequence in panel d reveals subtle but critical changes in domain structure and lattice symmetry
    with temperature, particularly the disappearance of superlattice spots at 165°C, suggesting a loss of long-range order
    during the AFE-to-MCC transition. However, the absence of quantitative analysis (e.g., domain size or strain mapping)
    limits mechanistic insight. Moreover, while panel e suggests increased heterogeneous energy stabilizes HDSs, the model
    assumes idealized symmetry without accounting for local defects or compositional fluctuations—key factors in real ceramics.
    The correlation between XRD peak shifts and actual phase boundaries remains implicit, and no direct comparison is made
    between simulated and experimental phase diagrams, weakening the predictive power of the free energy model.
  caption: Thermotropic phase evolution and HDS dynamics in antiferroelectric ceramics
